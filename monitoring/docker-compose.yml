version: '3.8'

services:
  # ===============================
  # CUSTOMER API (Your App)
  # ===============================
  customer_api:
    image: gbenga12/customer-api:latest
    container_name: customer-api
    ports:
      - "7074:7074"
    depends_on:
      - postgres
    restart: always
    networks:
      - monitoring
  # ===============================
  # POSTGRES DATABASE
  # ===============================
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: niitdevcustomerdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - monitoring
  # ===============================
  # PROMETHEUS
  # ===============================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring

  # ===============================
  # GRAFANA
  # ===============================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring

  # ===============================
  # NODE EXPORTER (SYSTEM METRICS)
  # ===============================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - monitoring

volumes:
  grafana_data:

networks:
  monitoring: