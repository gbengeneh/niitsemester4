global:
  scrape_interval: 5s

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Your Spring Boot App
  - job_name: 'customer-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['customer-api:7074']